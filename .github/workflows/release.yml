name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            os: ubuntu-latest
          - system: aarch64-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build
        run: nix build .#default --print-out-paths

      - name: Package artifact
        run: |
          mkdir -p dist
          cp result/bin/mbt-embed "dist/mbt-embed-${{ matrix.system }}"

      - uses: actions/upload-artifact@v4
        with:
          name: mbt-embed-${{ matrix.system }}
          path: dist/mbt-embed-${{ matrix.system }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
